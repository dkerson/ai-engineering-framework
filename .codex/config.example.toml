# Codex MCP - exemplo agregado
# Copiar para .codex/config.toml local. NUNCA commitar secrets.

[mcp_servers.context7]
type = "http"
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.headers]
CONTEXT7_API_KEY = "${CONTEXT7_API_KEY}"

[mcp_servers.github]
type = "http"
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.clickup]
type = "http"
url = "https://mcp.clickup.com/mcp"

[mcp_servers.mssql]
transport = "stdio"
command = "npx"
args = ["-y", "@mcp-collection/mssql-mcp"]

[mcp_servers.mssql.env]
HOST = "${MSSQL_HOST}"
PORT = "${MSSQL_PORT}"
USER = "${MSSQL_USER}"
PASSWORD = "${MSSQL_PASSWORD}"
DATABASE = "${MSSQL_DATABASE}"
TRUST_SERVER_CERTIFICATE = "${MSSQL_TRUST_SERVER_CERTIFICATE}"

[mcp_servers.mssql-fiscal]
transport = "stdio"
command = "npx"
args = ["-y", "@mcp-collection/mssql-mcp"]

[mcp_servers.mssql-fiscal.env]
HOST = "${MSSQL_FISCAL_HOST}"
PORT = "${MSSQL_FISCAL_PORT}"
USER = "${MSSQL_FISCAL_USER}"
PASSWORD = "${MSSQL_FISCAL_PASSWORD}"
DATABASE = "${MSSQL_FISCAL_DATABASE}"
TRUST_SERVER_CERTIFICATE = "${MSSQL_FISCAL_TRUST_SERVER_CERTIFICATE}"
